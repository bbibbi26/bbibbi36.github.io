<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안아조요 // BLUE_6_LOGIN</title>
    <link href="https://webfontworld.github.io/gmarket/GmarketSans.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --main-blue: #70d6ff;
            --soft-blue: rgba(112, 214, 255, 0.15);
            --cyber-white: #e2e8f0;
            --accent-pink: #ff007f;
            --font-main: 'GmarketSansBold', sans-serif;
            --font-light: 'GmarketSansLight', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, #101626 0%, #0a0e17 100%),
                linear-gradient(rgba(112, 214, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(112, 214, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: var(--cyber-white);
            font-family: var(--font-main);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
        }

        body.fade-out { opacity: 0; transform: scale(1.05); }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-out;
        }

        #loading-screen::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 101; background-size: 100% 3px, 6px 100%; pointer-events: none;
        }
        
        .loader-box { width: 340px; text-align: left; z-index: 102; position: relative; }
        
        .loading-text { 
            font-family: var(--font-main); font-size: 1rem; color: var(--main-blue); 
            letter-spacing: 2px; margin-bottom: 8px; height: 24px;
            text-shadow: 0 0 8px rgba(112, 214, 255, 0.6);
            animation: textPulse 1s infinite alternate;
        }
        
        @keyframes textPulse {
            0% { opacity: 0.8; text-shadow: 0 0 4px var(--main-blue); }
            100% { opacity: 1; text-shadow: 0 0 12px var(--main-blue), 0 0 4px var(--accent-pink); }
        }

        .loader-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; margin: 12px 0; border: 1px solid rgba(112,214,255,0.1); }
        .loader-bar { 
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, var(--main-blue) 0%, var(--accent-pink) 100%); 
            box-shadow: 0 0 15px var(--main-blue); 
            transition: width 0.2s cubic-bezier(0.1, 0.8, 0.2, 1); 
        }

        .loader-status-row { display: flex; justify-content: space-between; font-family: var(--font-light); font-size: 0.75rem; color: rgba(226, 232, 240, 0.6); letter-spacing: 1px; }
        
        .sub-log-box {
            margin-top: 15px; height: 35px; overflow: hidden; font-family: monospace; font-size: 0.7rem; color: #4e759a; line-height: 1.4;
            border-top: 1px dashed rgba(112, 214, 255, 0.2); padding-top: 8px; pointer-events: none;
        }

        .login-frame, .user-select-frame {
            display: none;
            position: relative;
            width: 420px;
            padding: 50px 25px;
            background-color: rgba(10, 14, 23, 0.85);
            border: 2px solid var(--cyber-white);
            border-radius: 40px 10px 40px 10px;
            box-shadow: 0 0 30px rgba(112, 214, 255, 0.15), 
                        inset 0 0 15px rgba(255, 255, 255, 0.05);
            text-align: center;
            backdrop-filter: blur(20px);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            box-sizing: border-box;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        h1 {
            font-size: 3rem; margin-bottom: 40px; letter-spacing: 6px; 
            color: var(--cyber-white); text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        input {
            width: 100%; background: rgba(0, 0, 0, 0.4); border: 2px solid var(--soft-blue);
            border-radius: 12px; padding: 15px; color: #fff; font-size: 1.1rem;
            text-align: center; outline: none; box-sizing: border-box;
            font-family: var(--font-main); transition: 0.3s ease;
            letter-spacing: 2px;
        }
        input:focus { border-color: var(--main-blue); box-shadow: 0 0 15px rgba(112, 214, 255, 0.3); }

        button {
            width: 100%; margin-top: 25px; padding: 18px; background: transparent;
            border: 2px solid var(--cyber-white); color: var(--cyber-white); font-size: 1.2rem; letter-spacing: 5px; cursor: pointer; 
            border-radius: 12px 30px 12px 30px; font-family: var(--font-main);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
        }
        button:hover { background: var(--cyber-white); color: var(--bg-dark); box-shadow: 0 0 25px rgba(255, 255, 255, 0.8); transform: translateY(-3px); }
        
        button.access-granted { border-color: var(--main-blue); color: var(--main-blue); box-shadow: 0 0 25px var(--main-blue); }
        button.access-granted:hover { background: var(--main-blue); color: var(--bg-dark); }
        button.denied { border-color: #ff4d4d; color: #ff4d4d; box-shadow: 0 0 20px #ff4d4d; animation: shake 0.4s ease; }
        button.denied:hover { background: #ff4d4d; color: #fff; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .user-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
            max-height: 330px;
            overflow-y: auto;
            padding-right: 4px;
        }
        
        .user-grid::-webkit-scrollbar { width: 4px; }
        .user-grid::-webkit-scrollbar-thumb { background: var(--main-blue); border-radius: 10px; }
        .user-grid::-webkit-scrollbar-track { background: var(--bg-dark); }

        .user-option {
            padding: 15px 10px; border: 2px solid var(--soft-blue); border-radius: 15px;
            cursor: pointer; transition: 0.3s; background: rgba(16, 22, 38, 0.6);
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
            box-sizing: border-box;
        }
        .user-option:hover { transform: translateY(-3px); border-color: var(--main-blue); background: var(--soft-blue); box-shadow: 0 0 15px rgba(112, 214, 255, 0.2); }
        
        .user-avatar { 
            width: 45px; height: 45px; font-size: 1.8rem; margin-bottom: 8px; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; border-radius: 50%;
            background: rgba(112, 214, 255, 0.05);
            border: 1px solid var(--soft-blue);
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .user-name { font-size: 0.8rem; font-family: var(--font-main); color: var(--cyber-white); max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .user-option:hover .user-name { color: var(--main-blue); }

        .footer-info { margin-top: 25px; font-size: 0.75rem; color: var(--cyber-white); display: flex; justify-content: space-between; opacity: 0.6; font-family: var(--font-light); letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-box">
            <div class="loading-text" id="status-msg">SYSTEM BOOTING...</div>
            <div class="loader-bar-bg">
                <div class="loader-bar" id="progress-bar"></div>
            </div>
            <div class="loader-status-row">
                <span>CORE_INITIALIZATION</span>
                <span id="percent">0%</span>
            </div>
            <div class="sub-log-box" id="sub-logs">
                > INITIALIZING SUB_SYSTEM...
            </div>
        </div>
    </div>

    <div class="login-frame" id="login-content">
        <h1>안아조요</h1>
        <input type="password" id="passcode" placeholder="PASSCODE_REQUIRED">
        <button id="login-btn" onclick="window.validateAccess()">ENTER SYSTEM</button>
        <div class="footer-info">
            <span>UNIT: ANAJOYO</span>
            <span>SECURE_MODE: ON</span>
        </div>
    </div>

    <div class="user-select-frame" id="user-select-content">
        <h1 style="font-size: 1.5rem; margin-bottom: 20px; letter-spacing: 3px; color: var(--cyber-white);">WHO ARE YOU?</h1>
        
        <div class="user-grid" id="member-grid-target"></div>
        
        <div class="footer-info" style="justify-content: center; margin-top: 20px;">
            <span>SELECT ACCESS PROFILE</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDi9JQLtpp4KaF5mGkf0aApv_fcQP2PpD0",
            authDomain: "nya-ppi.firebaseapp.com",
            databaseURL: "https://nya-ppi-default-rtdb.firebaseio.com",
            projectId: "nya-ppi",
            storageBucket: "nya-ppi.firebasestorage.app",
            messagingSenderId: "27439633492",
            appId: "1:27439633492:web:30be0dd3c47ae75562c9c1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const presenceRootRef = ref(db, 'multi_presence');

        let FIXED_USERS = [
            { userId: "user_me", name: "김삐뇽", icon: "❤️", xUrl: "https://x.com/Bow_wow__14" },
            { userId: "user_other", name: "덕추냥", icon: "🖤", xUrl: "https://x.com/ff14_bbiy" },
            { userId: "user_member3", name: "디디댕", icon: "💙", xUrl: "https://x.com" },
            { userId: "user_member4", name: "뿡뿡띠", icon: "💛", xUrl: "https://x.com" },
            { userId: "user_member5", name: "자바팁", icon: "🤎", xUrl: "https://x.com" },
            { userId: "user_member6", name: "정and법", icon: "💜", xUrl: "https://x.com" }
        ];

        onValue(presenceRootRef, (snap) => {
            const liveUsers = snap.val() || {};
            FIXED_USERS = FIXED_USERS.map(user => {
                if (liveUsers[user.userId]) {
                    return {
                        ...user,
                        name: liveUsers[user.userId].name || user.name,
                        icon: liveUsers[user.userId].icon || user.icon,
                        xUrl: liveUsers[user.userId].xUrl || user.xUrl
                    };
                }
                return user;
            });

            const currentSessionStr = localStorage.getItem('anajoyo_multi_session');
            if (currentSessionStr) {
                try {
                    const currentSession = JSON.parse(currentSessionStr);
                    const updatedUser = FIXED_USERS.find(u => u.userId === currentSession.userId);
                    if (updatedUser) {
                        localStorage.setItem('anajoyo_multi_session', JSON.stringify(updatedUser));
                    }
                } catch (e) {
                    console.error("Session parse error: ", e);
                }
            }

            if (document.getElementById('user-select-content') && document.getElementById('user-select-content').style.display === 'block') {
                window.renderMemberGrid();
            }
        });

        const messages = [
            "CONNECTING TO BLUE_STREAM...", 
            "DECRYPTING SECURITY PROTOCOLS...",
            "LOADING CYBER_ASSETS COMPONENTS...", 
            "STABILIZING NEON_INTERFACE PORTAL...", 
            "SYNCHRONIZING FIREBASE REALTIME_DB...",
            "DECODING INSTANCE MEMBER_DATA...", 
            "ACCESS PIPELINE READY."
        ];

        const microLogs = [
            "[OK] DB_STREAMER STARTED", "[INFO] NODE_CONNECTED: 27439633492",
            "[OK] PACKETS ROUTED VIA SECURE_SSL", "[SUCCESS] TOKEN DECRYPTED",
            "[INFO] PROFILE_CACHE_SYNC: COMPLETE", "[LOAD] ASSETS_URI MAPPED",
            "[SYSTEM] ALL CORE SYSTEM ONLINE"
        ];

        let progress = 0;
        const progressBar = document.getElementById('progress-bar');
        const percentText = document.getElementById('percent');
        const statusMsg = document.getElementById('status-msg');
        const subLogs = document.getElementById('sub-logs');

        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 12) + 4;
            if (progress >= 100) { 
                progress = 100; 
                clearInterval(interval); 
                finishLoading(); 
            }
            
            if(progressBar) progressBar.style.width = progress + "%";
            if(percentText) percentText.innerText = progress + "%";
            
            const msgIndex = Math.floor((progress / 100) * messages.length);
            if (messages[msgIndex] && statusMsg && statusMsg.innerText !== messages[msgIndex]) {
                statusMsg.innerText = messages[msgIndex];
            }

            if (Math.random() > 0.4 && subLogs) {
                const randomLog = microLogs[Math.floor(Math.random() * microLogs.length)];
                subLogs.innerHTML = `> ${randomLog}<br>> SYSTEM STATUS: ${progress}% PROCESSING...`;
            }
        }, 150);

        function finishLoading() {
            if(subLogs) subLogs.innerHTML = `> [SUCCESS] SYNC COMPLETE.<br>> REDIRECTING FRAME...`;
            setTimeout(() => {
                const loaderScreen = document.getElementById('loading-screen');
                if(loaderScreen) loaderScreen.style.opacity = '0';
                setTimeout(() => {
                    if(loaderScreen) loaderScreen.style.display = 'none';
                    
                    if (localStorage.getItem('anajoyo_multi_session')) {
                        document.body.classList.add('fade-out');
                        setTimeout(() => { location.href = "main.html"; }, 500);
                    } else {
                        const loginContent = document.getElementById('login-content');
                        if(loginContent) loginContent.style.display = 'block';
                    }
                }, 800);
            }, 400);
        }

        window.validateAccess = function() {
            const passField = document.getElementById('passcode');
            const btn = document.getElementById('login-btn');
            const pass = passField.value;

            if(pass === "0000") {
                btn.innerText = "ACCESS GRANTED";
                btn.classList.add('access-granted');
                
                setTimeout(() => {
                    document.getElementById('login-content').style.display = 'none';
                    document.getElementById('user-select-content').style.display = 'block';
                    window.renderMemberGrid();
                }, 600);
            } else {
                btn.innerText = "ACCESS DENIED";
                btn.classList.add('denied');
                passField.value = "";
                passField.focus();
                setTimeout(() => {
                    btn.classList.remove('denied');
                    btn.innerText = "ENTER SYSTEM";
                }, 1500);
            }
        };

        window.renderMemberGrid = function() {
            const grid = document.getElementById('member-grid-target');
            if(!grid) return;
            grid.innerHTML = '';

            FIXED_USERS.forEach(user => {
                const opt = document.createElement('div');
                opt.className = 'user-option';
                opt.onclick = () => window.selectFixedUser(user);

                const isImg = user.icon && (user.icon.startsWith('http') || user.icon.startsWith('data:image'));
                const avatarHTML = isImg ? `<img src="${user.icon}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">` : (user.icon || '👤');

                opt.innerHTML = `
                    <div class="user-avatar">${avatarHTML}</div>
                    <div class="user-name">${user.name}</div>
                `;
                grid.appendChild(opt);
            });
        }

        window.selectFixedUser = function(userObj) {
            const finalUser = FIXED_USERS.find(u => u.userId === userObj.userId) || userObj;
            localStorage.setItem('anajoyo_multi_session', JSON.stringify(finalUser));
            document.body.classList.add('fade-out');
            setTimeout(() => { location.href = "main.html"; }, 600);
        }

        document.getElementById('passcode').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                window.validateAccess();
            }
        });
    </script>
</body>
</html>
