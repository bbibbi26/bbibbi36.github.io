<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안아조요 // 6_MEMBERS_LOGIN</title>
    <link href="https://webfontworld.github.io/gmarket/GmarketSans.css" rel="stylesheet">
    
    <style>
        :root {
            --main-pink: #ff7eb9;
            --soft-pink: #ffe4f1;
            --cyber-white: #ffffff;
            --accent-blue: #70d6ff;
            --font-main: 'GmarketSansBold', sans-serif;
            --font-light: 'GmarketSansLight', sans-serif;
        }

        body {
            background-color: var(--soft-pink);
            background-image: 
                radial-gradient(circle at 50% 50%, #ffffff 0%, #ffe4f1 100%),
                linear-gradient(rgba(255, 255, 255, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.5) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: var(--main-pink);
            font-family: var(--font-main);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
        }

        body.fade-out { opacity: 0; transform: scale(1.05); }

        /* --- 로딩 화면 --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--soft-pink); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease-out;
        }
        .loader-box { width: 300px; text-align: left; }
        .loader-bar { width: 0%; height: 4px; background: var(--main-pink); box-shadow: 0 0 15px var(--main-pink); margin: 15px 0; transition: width 0.5s; }
        .loading-text { font-family: var(--font-light); font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 5px; height: 20px; }

        /* --- 공통 프레임 스타일 --- */
        .login-frame, .user-select-frame {
            display: none;
            position: relative;
            width: 420px;
            padding: 50px 25px;
            background-color: rgba(255, 255, 255, 0.95);
            border: 3px solid transparent;
            border-radius: 50px 15px 50px 15px;
            background-image: linear-gradient(rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.95)), 
                              linear-gradient(90deg, var(--main-pink), var(--accent-blue));
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow: 15px 15px 30px rgba(255, 126, 185, 0.15), 
                        -5px -5px 15px rgba(255, 255, 255, 0.8);
            text-align: center;
            backdrop-filter: blur(15px);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            box-sizing: border-box;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        h1 {
            font-size: 3rem; margin-bottom: 40px; letter-spacing: 6px; 
            color: var(--main-pink); text-transform: uppercase;
            text-shadow: 2px 2px 0px #fff;
        }

        input {
            width: 100%; background: #fff; border: 2px solid var(--soft-pink);
            border-radius: 15px; padding: 15px; color: var(--main-pink); font-size: 1.1rem;
            text-align: center; outline: none; box-sizing: border-box;
            font-family: var(--font-main); transition: 0.3s ease;
        }
        input:focus { border-color: var(--main-pink); box-shadow: 0 0 10px rgba(255, 126, 185, 0.1); }

        button {
            width: 100%; margin-top: 25px; padding: 18px; background: var(--main-pink);
            border: none; color: #fff; font-size: 1.2rem; letter-spacing: 5px; cursor: pointer; 
            border-radius: 15px 40px 15px 40px; font-family: var(--font-main);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(255, 126, 185, 0.3);
        }
        button:hover { background: #ff50a0; transform: translateY(-4px); }
        
        button.access-granted { background: var(--accent-blue); box-shadow: 0 0 20px var(--accent-blue); }
        button.denied { background: #ff4d4d; animation: shake 0.4s ease; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* --- 6인용 유저 그리드 배치 (2열 3행 구조) --- */
        .user-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
            max-height: 330px;
            overflow-y: auto;
            padding-right: 4px;
        }
        
        /* 스크롤바 커스텀 */
        .user-grid::-webkit-scrollbar { width: 4px; }
        .user-grid::-webkit-scrollbar-thumb { background: var(--main-pink); border-radius: 10px; }
        .user-grid::-webkit-scrollbar-track { background: var(--soft-pink); }

        .user-option {
            padding: 15px 10px; border: 2px solid var(--soft-pink); border-radius: 20px;
            cursor: pointer; transition: 0.3s; background: #fff;
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
            box-sizing: border-box;
        }
        .user-option:hover { transform: translateY(-3px); border-color: var(--main-pink); background: var(--soft-pink); }
        
        .user-avatar { 
            width: 45px; height: 45px; font-size: 1.8rem; margin-bottom: 8px; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; border-radius: 50%;
            background: rgba(255, 126, 185, 0.05);
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-size: 0.8rem; font-family: var(--font-main); color: var(--main-pink); max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .footer-info { margin-top: 25px; font-size: 0.75rem; color: var(--main-pink); display: flex; justify-content: space-between; opacity: 0.7; font-family: var(--font-light); }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-box">
            <div class="loading-text" id="status-msg">SYSTEM BOOTING...</div>
            <div class="loader-bar" id="progress-bar"></div>
            <div class="loading-text" id="percent">0%</div>
        </div>
    </div>

    <div class="login-frame" id="login-content">
        <h1>냥냥펀치</h1>
        <input type="password" id="passcode" placeholder="PASSCODE_REQUIRED">
        <button id="login-btn" onclick="validateAccess()">ENTER SYSTEM</button>
        <div class="footer-info">
            <span>UNIT: NYA-PPI</span>
            <span>SECURE_MODE: ON</span>
        </div>
    </div>

    <div class="user-select-frame" id="user-select-content">
        <h1 style="font-size: 1.5rem; margin-bottom: 20px; letter-spacing: 3px;">WHO ARE YOU?</h1>
        
        <div class="user-grid" id="member-grid-target"></div>
        
        <div class="footer-info" style="justify-content: center; margin-top: 20px;">
            <span>SELECT ACCESS PROFILE</span>
        </div>
    </div>

    <script type="module">
        // 🌟 [수정 안내] 각 유저의 name, icon(이모지 혹은 이미지 주소), xUrl을 실제 친구분들 정보로 자유롭게 바꾸세요!
        const FIXED_USERS = [
            { userId: "user_me", name: "NYA_PPI", icon: "🐰", xUrl: "https://x.com/Bow_wow__14" },
            { userId: "user_other", name: "ADMIN", icon: "🐱", xUrl: "https://x.com/ff14_bbiy" },
            { userId: "user_member3", name: "댕댕이", icon: "🐶", xUrl: "https://x.com" },
            { userId: "user_member4", name: "삐약이", icon: "🐥", xUrl: "https://x.com" },
            { userId: "user_member5", name: "햄찌", icon: "🐹", xUrl: "https://x.com" },
            { userId: "user_member6", name: "곰돌이", icon: "🐻", xUrl: "https://x.com" }
        ];

        // 하이패스 자동로그인 체크 로직
        window.addEventListener('load', () => {
            const savedSession = localStorage.getItem('nya_multi_session');
            if (savedSession) {
                document.body.classList.add('fade-out');
                setTimeout(() => { location.href = "main.html"; }, 500);
            }
        });

        // 로딩바 애니메이션 연출
        const messages = ["섹시코테의 머리칼을 빗어주는 중...", "환상의 옷장 정리중...", "엉킨 꼬리털 풀어내는 중...", "놀 준비 완료.", "접속중..."];
        let progress = 0;
        const progressBar = document.getElementById('progress-bar');
        const percentText = document.getElementById('percent');
        const statusMsg = document.getElementById('status-msg');

        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 15) + 5;
            if (progress >= 100) { progress = 100; clearInterval(interval); finishLoading(); }
            progressBar.style.width = progress + "%";
            percentText.innerText = progress + "%";
            const msgIndex = Math.floor((progress / 100) * messages.length);
            if (messages[msgIndex]) statusMsg.innerText = messages[msgIndex];
        }, 200);

        function finishLoading() {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    if(!localStorage.getItem('nya_multi_session')) {
                        document.getElementById('login-content').style.display = 'block';
                    }
                }, 1000);
            }, 400);
        }

        // 패스코드 인증 실행
        window.validateAccess = function() {
            const passField = document.getElementById('passcode');
            const btn = document.getElementById('login-btn');
            const pass = passField.value;

            if(pass === "0000") {
                btn.innerText = "ACCESS GRANTED";
                btn.classList.add('access-granted');
                
                setTimeout(() => {
                    document.getElementById('login-content').style.display = 'none';
                    document.getElementById('user-select-content').style.display = 'block';
                    renderMemberGrid();
                }, 600);
            } else {
                btn.innerText = "ACCESS DENIED";
                btn.classList.add('denied');
                passField.value = "";
                passField.focus();
                setTimeout(() => {
                    btn.classList.remove('denied');
                    btn.innerText = "ENTER SYSTEM";
                }, 1500);
            }
        };

        // 6명 목록 렌더링
        function renderMemberGrid() {
            const grid = document.getElementById('member-grid-target');
            grid.innerHTML = '';

            FIXED_USERS.forEach(user => {
                const opt = document.createElement('div');
                opt.className = 'user-option';
                opt.onclick = () => selectFixedUser(user);

                const isImg = user.icon.startsWith('http') || user.icon.startsWith('data:image');
                const avatarHTML = isImg ? `<img src="${user.icon}">` : user.icon;

                opt.innerHTML = `
                    <div class="user-avatar">${avatarHTML}</div>
                    <div class="user-name">${user.name}</div>
                `;
                grid.appendChild(opt);
            });
        }

        // 프로필 클릭 로그인 처리 및 이동
        function selectFixedUser(userObj) {
            localStorage.setItem('nya_multi_session', JSON.stringify(userObj));
            document.body.classList.add('fade-out');
            setTimeout(() => { location.href = "main.html"; }, 600);
        }

        document.getElementById('passcode').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') window.validateAccess();
        });
    </script>
</body>
</html>
